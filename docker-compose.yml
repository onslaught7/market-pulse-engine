services:
  # 1. Redis (The Broker)
  redis:
    image: redis:7.2-alpine
    container_name: vortex-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vortex-net

  # 2. Qdrant (The Vector Database)
  qdrant:
    image: qdrant/qdrant:v1.16.1
    container_name: vortex-qdrant
    ports:
      - "6333:6333"
    # Mount a volume so data persists across restarts
    volumes:
      - ./qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - vortex-net

  # 3. GO (The Gateway)
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: vortex-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - JAEGER_ENDPOINT=jaeger:4318
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vortex-net

  # 4. Python (The Worker)
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: vortex-worker
    environment:
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - vortex-net

  # 5. Go (The Producer)
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: vortex-producer
    environment:
      - GATEWAY_URL=http://gateway:8080/ingest
      - POLL_INTERVAL_SEC=60
    depends_on:
      - gateway
    networks:
      - vortex-net

  # 6. FastAPI (The Query API)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vortex-api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - vortex-net

  # 7. Jaeger (The Tracing Dashboard)
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: vortex-jaeger
    ports:
      - "16686:16686" # The Visual Web UI
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    networks:
      - vortex-net

  # 8. Prometheus (The Metrics Scraper)
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: vortex-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - vortex-net

networks:
  vortex-net:
    driver: bridge